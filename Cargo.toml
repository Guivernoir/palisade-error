[package]
name = "palisade_errors"
version = "0.2.1"
edition = "2024"
authors = ["Guilherme F. G. Santos <strukturaenterprise@gmail.com>"]
description = "Security-conscious error handling with operational security principles"
license = "Apache-2.0"
repository = "https://github.com/guivernoir/palisade_errors"
documentation = "https://docs.rs/palisade_errors"
readme = "README.md"
keywords = ["error", "security", "zeroize", "opsec", "forensics"]
categories = ["development-tools::debugging", "cryptography"]

[dependencies]
async-std = { version = "1.13.2", optional = true }
smallvec = "1.15.1"
tokio = { version = "1.49.0", features = [
    "time",
    "rt",
    "macros",
    "rt-multi-thread",
], optional = true }
zeroize = { version = "1.7", features = ["derive"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
chrono = "0.4.42"
md5 = "0.8.0"
serde_json = "1.0.149"
proptest = "1.5"

[features]
default = []
# Enable detailed debug formatting for trusted environments only
trusted_debug = []
# Reserved for future external signaling capabilities
external_signaling = []
# Async timing normalization support
tokio = ["dep:tokio"]
async_std = ["dep:async-std"]
# Error code obfuscation for paranoid deployments
obfuscate_codes = []

# ============================================================================
# EXAMPLES
# ============================================================================


[[example]]
name = "basic_usage"
path = "examples/basic_usage.rs"

[[example]]
name = "sensitive_context"
path = "examples/sensitive_context.rs"

[[example]]
name = "honeypot_pipeline"
path = "examples/honeypot_pipeline.rs"

[[example]]
name = "logging"
path = "examples/production_logging.rs"

[[example]]
name = "ring_buffer_demo"
path = "examples/ring_buffer_demo.rs"

[[example]]
name = "async_timing"
path = "examples/async_timing.rs"
required-features = ["tokio"]

[[example]]
name = "obfuscation_demo"
path = "examples/obfuscation_demo.rs"
required-features = ["obfuscate-codes"]

# ============================================================================
# BENCHMARKS
# ============================================================================

[[bench]]
name = "error_performance"
harness = false

# ============================================================================
# TESTS
# ============================================================================

[[test]]
name = "proptest_suite"
path = "tests/proptest_suite.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

# ============================================================================
# PROFILE CONFIGURATIONS
# ============================================================================

[profile.bench]
# Optimize for performance during benchmarks
opt-level = 3
lto = true
codegen-units = 1
