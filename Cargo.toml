[package]
name = "palisade_errors"
version = "0.1.0"
edition = "2024"
authors = ["Guilherme F. G. Santos <strukturaenterprise@gmail.com>"]
description = "Security-conscious error handling with operational security principles"
license = "MIT OR Apache-2.0"
repository = "https://github.com/guivernoir/palisade_errors"
documentation = "https://docs.rs/palisade_errors"
readme = "README.md"
keywords = ["error", "security", "zeroize", "opsec", "forensics"]
categories = ["development-tools::debugging", "cryptography"]

[dependencies]
smallvec = "1.15.1"
zeroize = { version = "1.7", features = ["derive"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
chrono = "0.4.42"
md5 = "0.8.0"
serde_json = "1.0.149"

[features]
default = []
# Enable detailed debug formatting for trusted environments only
trusted_debug = []
# Reserved for future external signaling capabilities
external_signaling = []

# ============================================================================
# EXAMPLES
# ============================================================================

[[example]]
name = "basic_usage"
path = "examples/basic_usage.rs"

[[example]]
name = "sensitive_context"
path = "examples/sensitive_context.rs"

[[example]]
name = "honeypot_pipeline"
path = "examples/honeypot_pipeline.rs"

[[example]]
name = "logging"
path = "examples/production_logging.rs"

# ============================================================================
# BENCHMARKS
# ============================================================================

[[bench]]
name = "error_performance"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

# ============================================================================
# PROFILE CONFIGURATIONS
# ============================================================================

[profile.bench]
# Optimize for performance during benchmarks
opt-level = 3
lto = true
codegen-units = 1
